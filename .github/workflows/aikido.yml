name: Aikido Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  aikido-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Aikido Security Scan
        uses: AikidoSec/github-actions-workflow@main
        with:
          secret-key: ${{ secrets.AIKIDO_SECRET_KEY }}
